# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,1366x768,auto,1
monitor=HDMI-A-1,2560x1440,auto,1

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = sh ~/.config/scripts/init.sh
exec = sh ~/.config/scripts/wallpaper.sh
exec = sh ~/.config/scripts/waybar.sh
exec = swayidle -w timeout 300 "sh ~/.config/scripts/setBrightness.sh 100%" resume "sh ~/.config/scripts/setBrightness.sh 0%"
exec = swayidle -w timeout 600 "swaylock -f"
exec = swayidle -w timeout 900 'systemctl suspend'

# Some default env vars.
env = XCURSOR_SIZE,24

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 0
    border_size = 0
    resize_on_border = true
     

    layout = dwindle
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  vfr = true
  vrr = 0
  animate_manual_resizes = true
  mouse_move_focuses_monitor = true
  enable_swallow = true
  swallow_regex = ^(wezterm)$
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 0
    active_opacity = 0.7
    inactive_opacity = 0.5    

    blur {
        enabled = true
        size = 0
        passes = 0
        new_optimizations = true
        ignore_opacity = true
        noise = 0
#        brightness = 0.6
    }
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = wind, 0.05, 0.9, 0.1, 0.9
    bezier = winIn, 0.1, .1, 0.1, 1.1
    bezier = winOut, 0.3, 0.3, 0, 1

    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to MOD + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = false
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = false
}

# Example per-device config
# See https://wiki.hyprland.org/Confswaybg -i ~/Pictures/wallpaper.jpgiguring/Keywords/#executing for more
device:epic-mouse-v1 {
    sensitivity = -0.5
}

# Example windowrule v1
#windowrule = rounding 12, ^(google-chrome)$
windowrule = opacity 1 override, ^(Google-chrome)$
windowrule = opacity 1 override, ^(gpartedbin)$


# Example windowrule v2
#windowrulev2 = move [0] [0], class:^(Com.github.Aylur.ags)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$MOD = SUPER
$MOD_SHIFT = SUPER_SHIFT
$MOD_CTRL = SUPER_CTRL

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $MOD, Return, exec, kitty
bind = $MOD, R, exec, rofi -show drun -show-icons -config ~/.cache/wal/colors-rofi-dark.rasi
bind = $MOD, Q, killactive
bind = $MOD, B, exec, google-chrome-stable
bind = $MOD, L, exec, swaylock
bind = $MOD_SHIFT, W, exec, sh ~/.config/scripts/switchWallpaper.sh
bind = $MOD, M, exit,
bind = $MOD, E, exec, code
bind = $MOD_SHIFT, R, exec, hyprctl reload
bind = $MOD, t, exec, thunar
bind = $MOD, V, togglefloating, 
bind = $MOD, F, fullscreen
bind = $MOD, P, pseudo, # dwindle
bind = $MOD, J, togglesplit, # dwindle
bind = , XF86MonBrightnessDown, exec, ~/.config/scripts/setBrightness.sh 1%-
bind = , XF86MonBrightnessUp, exec, ~/.config/scripts/setBrightness.sh 1%+
bind = , XF86AudioMute, exec, pactl set-sink-volume @DEFAULT_SINK@ 0%
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +2%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -2%

# Move focus with MOD + arrow keys
bind = $MOD, left, movefocus, l
bind = $MOD, right, movefocus, r
bind = $MOD, up, movefocus, u
bind = $MOD, down, movefocus, d

bind = $MOD_SHIFT, right, resizeactive, 10 0
bind = $MOD_SHIFT, left, resizeactive, -10 0
bind = $MOD_SHIFT, up, resizeactive, 0 -10
bind = $MOD_SHIFT, down, resizeactive, 0 10

# Switch workspaces with MOD + [0-9]
bind = $MOD, 1, workspace, 1
bind = $MOD, 2, workspace, 2
bind = $MOD, 3, workspace, 3
bind = $MOD, 4, workspace, 4
bind = $MOD, 5, workspace, 5
bind = $MOD, 6, workspace, 6
bind = $MOD, 7, workspace, 7
bind = $MOD, 8, workspace, 8
bind = $MOD, 9, workspace, 9
bind = $MOD, 0, workspace, 10

# Move active window to a workspace with MOD + SHIFT + [0-9]
bind = $MOD_SHIFT, 1, movetoworkspace, 1
bind = $MOD_SHIFT, 2, movetoworkspace, 2
bind = $MOD_SHIFT, 3, movetoworkspace, 3
bind = $MOD_SHIFT, 4, movetoworkspace, 4
bind = $MOD_SHIFT, 5, movetoworkspace, 5
bind = $MOD_SHIFT, 6, movetoworkspace, 6
bind = $MOD_SHIFT, 7, movetoworkspace, 7
bind = $MOD_SHIFT, 8, movetoworkspace, 8
bind = $MOD_SHIFT, 9, movetoworkspace, 9
bind = $MOD_SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with MOD + scroll
bind = $MOD, mouse_down, workspace, e+1
bind = $MOD, mouse_up, workspace, e-1

# Move/resize windows with MOD + LMB/RMB and dragging
bindm = $MOD, mouse:272, movewindow
bindm = $MOD, mouse:273, resizewindow
